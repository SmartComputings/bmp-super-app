<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to App...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .fallback {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-size: 14px;
        }

        .button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .url-display {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin: 15px 0;
        }

        .success {
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4CAF50;
            color: #4CAF50;
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #F44336;
            color: #F44336;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔄 Redirecting to App...</h1>
        <div class="spinner"></div>
        <p>Please wait while we redirect you back to the app...</p>

        <div class="fallback">
            <p><strong>If you're not redirected automatically:</strong></p>
            <div class="url-display" id="deepLinkUrl"></div>
            <button class="button" onclick="openApp()">📱 Open App</button>
            <button class="button" onclick="copyUrl()">📋 Copy Link</button>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect');
        const signedAgreementId = urlParams.get('signed_agreement_id');

        console.log('Redirect page loaded');
        console.log('Redirect URL:', redirectUrl);
        console.log('Signed Agreement ID:', signedAgreementId);
        console.log('Current URL:', window.location.href);

        // Check if we have a signed_agreement_id from Bridge
        if (signedAgreementId) {
            console.log('✅ Received signed_agreement_id from Bridge:', signedAgreementId);

            // Create the deep link URL with the signed_agreement_id
            const deepLinkUrl = `myapp://tos-complete?signed_agreement_id=${signedAgreementId}`;
            document.getElementById('deepLinkUrl').textContent = deepLinkUrl;

            // Try to open the app immediately
            setTimeout(() => {
                try {
                    console.log('🚀 Attempting to open app with deep link:', deepLinkUrl);
                    window.location.href = deepLinkUrl;
                } catch (e) {
                    console.error('Failed to open app:', e);
                }
            }, 1000);

            // Fallback: try again after 3 seconds
            setTimeout(() => {
                try {
                    console.log('🔄 Fallback attempt to open app:', deepLinkUrl);
                    window.location.href = deepLinkUrl;
                } catch (e) {
                    console.error('Fallback redirect failed:', e);
                }
            }, 3000);

            // Show success message
            document.querySelector('.fallback').innerHTML = `
                <div class="success" style="padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                    <p><strong>✅ Terms of Service Accepted!</strong></p>
                    <p>Signed Agreement ID: <code>${signedAgreementId}</code></p>
                    <p>Redirecting to app...</p>
                </div>
                <p><strong>If you're not redirected automatically:</strong></p>
                <div class="url-display">${deepLinkUrl}</div>
                <button class="button" onclick="openApp()">📱 Open App</button>
                <button class="button" onclick="copyUrl()">📋 Copy Link</button>
            `;

        } else if (redirectUrl) {
            // Handle the redirect parameter (fallback case)
            console.log('📱 Using redirect parameter:', redirectUrl);
            document.getElementById('deepLinkUrl').textContent = redirectUrl;

            // Try to open the app immediately
            setTimeout(() => {
                try {
                    window.location.href = redirectUrl;
                } catch (e) {
                    console.error('Failed to open app:', e);
                }
            }, 1000);

            // Fallback: try again after 3 seconds
            setTimeout(() => {
                try {
                    window.location.href = redirectUrl;
                } catch (e) {
                    console.error('Fallback redirect failed:', e);
                }
            }, 3000);

        } else {
            // No parameters found
            console.log('⚠️ No redirect parameters found');
            document.getElementById('deepLinkUrl').textContent = 'No redirect parameters found';
            document.querySelector('.fallback').innerHTML = `
                <div class="error" style="padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                    <p><strong>⚠️ No redirect parameters found</strong></p>
                    <p>This page expects either:</p>
                    <ul style="text-align: left; display: inline-block;">
                        <li><code>signed_agreement_id</code> from Bridge ToS completion</li>
                        <li><code>redirect</code> parameter for manual redirects</li>
                    </ul>
                </div>
            `;
        }

        function openApp() {
            const deepLinkUrl = document.getElementById('deepLinkUrl').textContent;
            if (deepLinkUrl && deepLinkUrl !== 'No redirect parameters found') {
                try {
                    console.log('📱 Manually opening app with:', deepLinkUrl);
                    window.location.href = deepLinkUrl;
                } catch (e) {
                    console.error('Failed to open app:', e);
                    alert('Failed to open app. Please copy the link and open it manually.');
                }
            }
        }

        function copyUrl() {
            const deepLinkUrl = document.getElementById('deepLinkUrl').textContent;
            if (deepLinkUrl && deepLinkUrl !== 'No redirect parameters found') {
                navigator.clipboard.writeText(deepLinkUrl).then(() => {
                    alert('Deep link copied to clipboard!');
                }).catch(() => {
                    // Fallback for older browsers
                    const textArea = document.createElement('textarea');
                    textArea.value = deepLinkUrl;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    alert('Deep link copied to clipboard!');
                });
            }
        }
    </script>
</body>

</html>
